<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pico W RGB Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 15px; display: inline-block; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .slider-container { margin: 20px; }
        input[type=range] { width: 200px; }
        .label { font-weight: bold; width: 50px; display: inline-block; }
        #preview { width: 100%; height: 40px; border-radius: 5px; margin-top: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Pico W RGB 제어</h1>
        <div id="statusText">슬라이더를 조절하세요</div>

        <div class="slider-container">
            <span class="label" style="color:red">Red</span>
            <input type="range" id="R" min="0" max="255" value="0" onchange="sendRGB()">
        </div>
        <div class="slider-container">
            <span class="label" style="color:green">Green</span>
            <input type="range" id="G" min="0" max="255" value="0" onchange="sendRGB()">
        </div>
        <div class="slider-container">
            <span class="label" style="color:blue">Blue</span>
            <input type="range" id="B" min="0" max="255" value="0" onchange="sendRGB()">
        </div>
        
        <div id="preview"></div>
    </div>

    <script>
        // 본인의 Firebase URL (끝에 /ledStatus.json 확인)
        const dbUrl = "https://pico-2291c-default-rtdb.asia-southeast1.firebasedatabase.app/ledStatus.json";

        function sendRGB() {
            const r = document.getElementById('R').value;
            const g = document.getElementById('G').value;
            const b = document.getElementById('B').value;

            // 미리보기 색상 변경
            document.getElementById('preview').style.backgroundColor = `rgb(${r},${g},${b})`;

            // Firebase에 숫자(Number) 형태로 전송
            const data = {
                Red: parseInt(r),
                Green: parseInt(g),
                Blue: parseInt(b)
            };

            fetch(dbUrl, {
                method: 'PUT',
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(json => {
                document.getElementById('statusText').innerText = `전송 완료: R(${json.Red}) G(${json.Green}) B(${json.Blue})`;
            });
        }
    </script>
</body>
</html>
